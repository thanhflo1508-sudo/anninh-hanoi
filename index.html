        .job-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid #eee; display: flex; flex-direction: column; position: relative; }

    function renderJobs(data) {
        const list = document.getElementById('jobList');
        list.innerHTML = data.map(job => `
            <div class="job-card">
                <div class="job-header"><i class="far fa-building"></i> ${job.company}</div>
                ${job.hot ? '<div class="hot-badge">TUYỂN GẤP</div>' : ''}
                <div class="job-body">
                    <h3 style="margin:0; color:var(--main);">${job.title}</h3>
                    <p style="margin:10px 0; color:#666; font-size:14px;"><i class="fas fa-map-marker-alt"></i> ${job.district}</p>
                    <div class="salary-text">${job.salary.toFixed(1)} TRIỆU</div>
                    <div class="btn-group">
                        <button class="btn btn-apply" onclick="openModal()">ỨNG TUYỂN</button>
                        <a href="https://www.google.com/maps/search/${job.map}" target="_blank" class="btn btn-map">BẢN ĐỒ</a>
                    </div>
                </div>
            </div>
        `).join('');
    }

    function openModal() { 
        document.getElementById('modalApply').style.display = 'flex'; 
        document.getElementById('formState').style.display = 'block';
        document.getElementById('thankYouState').style.display = 'none';
    }
    function closeModal() { document.getElementById('modalApply').style.display = 'none'; }

    function sendToGmail(event) {
        event.preventDefault();
        const btn = document.getElementById('btnSubmit');
        btn.innerText = "ĐANG GỬI...";
        btn.disabled = true;

        const params = {
            fullName: document.getElementById('fullName').value,
            phone: document.getElementById('phone').value,
            education: document.getElementById('education').value,
            salaryExpect: document.getElementById('salaryExpect').value + " Triệu",
            experience: document.getElementById('experience').value
        };

        emailjs.send("service_o9hrahu", "template_8vdaj6e", params)
            .then(() => {
                document.getElementById('formState').style.display = 'none';
                document.getElementById('thankYouState').style.display = 'block';
                document.getElementById('formApplication').reset();
                btn.innerText = "ỨNG TUYỂN NGAY";
                btn.disabled = false;
            }, (err) => {
                alert("Có lỗi xảy ra, vui lòng thử lại sau.");
                btn.disabled = false;
            });
    }

    function filterJobs() {
        const keyword = document.getElementById('searchInput').value.toLowerCase();
        const minSalary = parseFloat(document.getElementById('salaryFilter').value);
        const filtered = jobs.filter(j => 
            (j.district.toLowerCase().includes(keyword) || j.title.toLowerCase().includes(keyword) || j.company.toLowerCase().includes(keyword)) &&
            (j.salary >= minSalary)
        );
        renderJobs(filtered);
    }

    renderJobs(jobs);
</script>
</body>
</html>
